<!DOCTYPE html>
<html>
<head>
    <title>Extract Outline</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0 auto;
            padding: 20px;
            max-width: 800px;
            background-color: #282a36;
            color: #f8f8f2;
        }

        h1 {
            color: #f8f8f2;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 300px;
            margin-bottom: 16px;
            padding: 12px;
            background-color: #44475a;
            color: #f8f8f2;
            border: 1px solid #6272a4;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #bd93f9;
        }

        button {
            padding: 12px 24px;
            margin-right: 12px;
            font-size: 14px;
            cursor: pointer;
            background-color: #44475a;
            color: #f8f8f2;
            border: none;
            border-radius: 6px;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: #6272a4;
        }

        #output {
            white-space: pre-wrap;
            border: 1px solid #6272a4;
            padding: 12px;
            margin-top: 20px;
            background-color: #44475a;
            border-radius: 6px;
            max-height: 400px;
            overflow-y: auto;
        }

        .credits {
            margin-top: 20px;
            font-size: 12px;
            text-align: center;
            color: #6272a4;
            line-height: 1.5;
        }

        .credits a {
            color: #bd93f9;
            text-decoration: none;
        }

        .credits a:hover {
            color: #ff79c6;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #282a36;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #6272a4;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #bd93f9;
        }
    </style>
</head>
<body>
    <h1>Extract Outline</h1>
    <p>Paste your Markdown content below and click "Get Outline" to extract headings:</p>
    <textarea id="input" placeholder="Paste your Markdown here..."></textarea>
    <button id="extractBtn">Get Outline</button>
    <button id="copyBtn">Copy Outline</button>
    <div id="output"></div>
    <div class="credits">
        Crafted with &#129499; by <a href="https://mtri.me/?ref=chrome-ext" target="_blank">Tri Vo</a><br>
        Connect with me on <a href="https://linkedin.com/in/vominhtri" target="_blank">LinkedIn</a>
    </div>
    <script src="outline.js"></script>
</body>
</html>
