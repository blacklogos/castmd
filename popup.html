<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #ffffff;
      color: #111827;
      font-size: 13px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    .shell { padding: 14px; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .logo { font-size: 13.5px; letter-spacing: -0.3px; }
    .logo-mark { font-weight: 700; color: #111827; }
    .logo-dot { color: #7c6af7; font-weight: 600; }

    /* Mode toggle MD | JSON */
    .mode-toggle {
      display: flex;
      gap: 1px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 2px;
    }

    /* ── Base button reset ── */
    button {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      font-size: 12.5px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      background: transparent;
      color: inherit;
      transition: border-color 0.12s, box-shadow 0.12s, color 0.12s, background 0.12s;
    }

    /* Mode buttons */
    .mode-btn {
      padding: 3px 9px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      color: #9ca3af;
      width: auto;
      gap: 0;
    }

    .mode-btn.active {
      background: #ffffff;
      color: #374151;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.04);
    }

    .mode-btn:hover:not(.active) { color: #6b7280; }

    /* ── Action buttons ── */
    .actions { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }

    .actions button,
    .preview-actions button {
      background: #fafafa;
      color: #374151;
      border-color: #e8e8e8;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    .actions button:hover,
    .preview-actions button:hover {
      background: #ffffff;
      border-color: #a78bfa;
      color: #111827;
      box-shadow: 0 0 0 3px rgba(124,106,247,0.08), 0 1px 3px rgba(0,0,0,0.06);
    }

    .actions button:active,
    .preview-actions button:active { background: #f9f7ff; }

    .actions button svg,
    .preview-actions button svg {
      flex-shrink: 0;
      color: #d1d5db;
      transition: color 0.12s;
    }

    .actions button:hover svg,
    .preview-actions button:hover svg { color: #7c6af7; }

    /* Tab count badge */
    .tab-badge {
      margin-left: auto;
      font-size: 10px;
      font-family: 'SF Mono', ui-monospace, monospace;
      color: #9ca3af;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 1px 6px;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }

    .actions button:hover .tab-badge {
      color: #7c6af7;
      border-color: #c4b5fd;
      background: #f5f3ff;
    }

    /* ── Status ── */
    .status-row {
      min-height: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11.5px;
      color: #e5e7eb;
      padding: 0 1px;
    }

    .status-row.success { color: #059669; }
    .status-row.error   { color: #dc2626; }
    .status-row.info    { color: #7c6af7; }

    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
      background: currentColor;
    }

    #tokenCount {
      margin-left: auto;
      font-size: 10.5px;
      font-family: 'SF Mono', ui-monospace, monospace;
      color: #d1d5db;
    }

    .status-row.success #tokenCount,
    .status-row.error #tokenCount { color: inherit; opacity: 0.6; }

    /* Model fit row */
    .model-fit {
      display: none;
      gap: 4px;
      flex-wrap: wrap;
      padding: 5px 1px 2px;
    }

    .model-fit.visible { display: flex; }

    .model-chip {
      font-size: 10px;
      font-family: 'SF Mono', ui-monospace, monospace;
      padding: 1px 6px;
      border-radius: 4px;
      border: 1px solid;
    }

    .model-chip.fits {
      color: #059669;
      border-color: #a7f3d0;
      background: #f0fdf4;
    }

    .model-chip.over {
      color: #9ca3af;
      border-color: #e5e7eb;
      background: #fafafa;
      text-decoration: line-through;
    }

    /* ── Preview panel ── */
    .preview-panel {
      display: none;
      margin-top: 10px;
      border-top: 1px solid #f3f4f6;
      padding-top: 10px;
    }

    .preview-panel.open { display: block; }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .preview-label {
      font-size: 10.5px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 500;
    }

    .preview-close {
      width: auto;
      padding: 2px 7px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      color: #9ca3af;
      font-size: 11px;
      background: transparent;
      box-shadow: none;
      gap: 0;
    }

    .preview-close:hover {
      border-color: #d1d5db;
      color: #6b7280;
      background: #f9fafb;
      box-shadow: none;
    }

    .preview-textarea {
      width: 100%;
      height: 140px;
      background: #fafafa;
      color: #374151;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 8px;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      transition: border-color 0.12s, box-shadow 0.12s;
    }

    .preview-textarea:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(124,106,247,0.06);
    }

    .preview-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }

    .preview-actions button {
      flex: 1;
      font-size: 11.5px;
      padding: 6px 10px;
    }

    /* ── Separator ── */
    .sep {
      border: none;
      border-top: 1px solid #f3f4f6;
      margin: 10px 0;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-hint {
      font-size: 10.5px;
      color: #d1d5db;
      font-family: 'SF Mono', ui-monospace, monospace;
    }

    .footer a {
      font-size: 10.5px;
      color: #9ca3af;
      text-decoration: none;
      transition: color 0.12s;
    }

    .footer a:hover { color: #7c6af7; }
  </style>
</head>
<body>
  <div class="shell">

    <div class="header">
      <div class="logo">
        <span class="logo-mark">cast</span><span class="logo-dot">.md</span>
      </div>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="md">MD</button>
        <button class="mode-btn" data-mode="json">JSON</button>
        <button class="mode-btn" data-mode="xml">XML</button>
      </div>
    </div>

    <div class="actions">
      <button id="copyMdBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
        <span id="copyMdLabel">Copy as Markdown</span>
      </button>
      <button id="saveMdBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        <span id="saveMdLabel">Save as .md</span>
      </button>
      <button id="copyOutlineBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="21" y1="10" x2="7" y2="10"></line>
          <line x1="21" y1="6" x2="3" y2="6"></line>
          <line x1="21" y1="14" x2="3" y2="14"></line>
          <line x1="21" y1="18" x2="7" y2="18"></line>
        </svg>
        Copy Outline
      </button>
      <button id="copyAllTabsBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        Copy all tabs
        <span class="tab-badge" id="tabCount">…</span>
      </button>
    </div>

    <div class="status-row" id="statusRow">
      <span class="status-dot" id="statusDot" style="display:none"></span>
      <span id="statusText"></span>
      <span id="tokenCount"></span>
    </div>

    <div class="model-fit" id="modelFit"></div>

    <!-- Preview / edit panel — shown after any conversion -->
    <div class="preview-panel" id="previewPanel">
      <div class="preview-header">
        <span class="preview-label">Preview &amp; Edit</span>
        <button class="preview-close" id="closePreview">close</button>
      </div>
      <textarea class="preview-textarea" id="previewText" spellcheck="false"></textarea>
      <div class="preview-actions">
        <button id="recopyBtn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          Re-copy
        </button>
        <button id="resaveBtn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Re-save
        </button>
      </div>
    </div>

    <hr class="sep">

    <div class="footer">
      <span class="footer-hint">⌃⇧M · right-click</span>
      <a href="https://cc4.marketing" target="_blank">cc4.marketing</a>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
